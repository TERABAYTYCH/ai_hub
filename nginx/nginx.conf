worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+text text/javascript;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ============================================
    # UPSTREAM BACKENDS
    # ============================================
    upstream hub_backend {
        server host.docker.internal:3000;
    }

    upstream pulse_backend {
        server host.docker.internal:3001;
    }

    # ============================================
    # HUB FRONTEND (hub.lvh.me)
    # ============================================
    server {
        listen 80;
        server_name hub.lvh.me;

        location / {
            proxy_pass http://172.18.0.11:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ============================================
    # PULSE FRONTEND (pulse.lvh.me)
    # ============================================
    server {
        listen 80;
        server_name pulse.lvh.me;

        root /usr/share/nginx/html/pulse;

        # Proxy manifest.json to Vite dev server (Vite adds its own CORS headers)
        location = /assets/manifest.json {
            proxy_pass http://host.docker.internal:5174/assets/manifest.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Serve static assets from dist folder (has remoteEntry.js for Module Federation)
        location /assets/ {
            alias /usr/share/nginx/html/pulse/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        }

        # Serve index.html for SPA
        location = / {
            try_files /index.html =404;
        }

        # Proxy everything else to Vite dev server (Vite adds its own CORS headers)
        location / {
            proxy_pass http://host.docker.internal:5174;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ============================================
    # HUB API (api.hub.lvh.me)
    # ============================================
    server {
        listen 80;
        server_name api.hub.lvh.me;

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://hub_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # ============================================
    # PULSE API (api.pulse.lvh.me)
    # ============================================
    server {
        listen 80;
        server_name api.pulse.lvh.me;

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://pulse_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # ============================================
    # LEGACY: HUB FRONTEND (hub.localhost) - deprecated
    # ============================================
    server {
        listen 80;
        server_name hub.localhost;

        location / {
            proxy_pass http://172.18.0.11:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ============================================
    # LEGACY: PULSE FRONTEND (pulse.localhost) - deprecated
    # ============================================
    server {
        listen 80;
        server_name pulse.localhost;

        location / {
            proxy_pass http://host.docker.internal:5174;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ============================================
    # DEFAULT SERVER (catch-all)
    # ============================================
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 http://hub.lvh.me$request_uri;
        }
    }
}
